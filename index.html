<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gym Membership Renewal</title>

  <script src="https://js.paystack.co/v1/inline.js"></script>

  <style>

    body {
      margin: 0;
      background: #0f0f0f;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #1d1d1d;
      width: 350px;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    h1 {
      text-align: center;
      margin-bottom: 25px;
    }

    input,
    select,
    button {
      width: 100%;
      padding: 14px;
      margin-top: 12px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
    }

    input,
    select {
      background: #2b2b2b;
      color: white;
    }

    button {
      background: #00c853;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

  </style>
</head>

<body>

<div class="card">

    <h1>Renew Membership</h1>

    <input
        type="text"
        id="firstName"
        placeholder="First Name"
    />

    <br><br>

    <input
        type="text"
        id="lastName"
        placeholder="Last Name"
    />

    <br><br>

    <input
        type="email"
        id="email"
        placeholder="Email Address"
    />

    <br><br>

    <button onclick="payWithPaystack('1 Month', 10000)">
        1 Month - ₦10,000
    </button>

    <br><br>

    <button onclick="payWithPaystack('3 Months', 25000)">
        3 Months - ₦25,000
    </button>

    <br><br>

    <button onclick="payWithPaystack('6 Months', 50000)">
        6 Months - ₦50,000
    </button>

</div>

</div>

<script src="https://js.paystack.co/v1/inline.js"></script>

<script>

function payWithPaystack(plan, amount) {

    let firstName = document.getElementById("firstName").value;

let lastName = document.getElementById("lastName").value;

let email = document.getElementById("email").value;

    let handler = PaystackPop.setup({

        key: 'pk_test_d55ae7cd5421b1ea5cea848d88a4c5698909bed1',

        email: email,

        amount: amount * 100,

        currency: 'NGN',

        ref: 'PS-' + Date.now(),

        callback: function(response) {

            fetch('https://dhamielarey002.app.n8n.cloud/webhook-test/gym-renewal', {

                method: 'POST',

                headers: {
                    'Content-Type': 'application/json'
                },

                body: JSON.stringify({

    first_name: firstName,

    last_name: lastName,

    email: email,

    subscription: plan,

    amount: amount,

    payment_status: 'Paid',

    source: 'Paystack',

    transaction_id: response.reference

})

                })

            });

            window.location.href =
            "https://emperordre.github.io/gym-renewal/success.html";

        },

        onClose: function() {

            alert('Transaction cancelled');

        }

    });

    handler.openIframe();

}

</script>
