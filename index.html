<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gym Membership Renewal</title>

  <script src="https://js.paystack.co/v1/inline.js"></script>

  <style>

    body {
      margin: 0;
      background: #0f0f0f;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #1d1d1d;
      width: 350px;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    h1 {
      text-align: center;
      margin-bottom: 25px;
    }

    input,
    select,
    button {
      width: 100%;
      padding: 14px;
      margin-top: 12px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
    }

    input,
    select {
      background: #2b2b2b;
      color: white;
    }

    button {
      background: #00c853;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

  </style>
</head>

<body>

<div class="card">

  <h1>Renew Membership</h1>

  <input
    type="text"
    id="memberId"
    placeholder="Member ID"
  />

  <input
    type="email"
    id="email"
    placeholder="Email Address"
  />

  <select id="plan">
    <option value="Monthly">Monthly - ₦10,000</option>
    <option value="Quarterly">Quarterly - ₦25,000</option>
    <option value="Yearly">Yearly - ₦90,000</option>
  </select>

  <button onclick="payWithPaystack()">
    Renew Now
  </button>

</div>

<script>

function payWithPaystack() {

  let email = document.getElementById("email").value;

  let memberId = document.getElementById("memberId").value;

  let plan = document.getElementById("plan").value;

  let amount = 10000;

  if (plan === "Quarterly") amount = 25000;

  if (plan === "Yearly") amount = 90000;

  let handler = PaystackPop.setup({

    key: 'YOUR_PAYSTACK_PUBLIC_KEY',

    email: email,

    amount: amount * 100,

    currency: "NGN",

    metadata: {
      member_id: memberId,
      subscription: plan
    },

    callback: function(response) {

      fetch('YOUR_N8N_WEBHOOK_URL', {

        method: 'POST',

        headers: {
          'Content-Type': 'application/json'
        },

        body: JSON.stringify({
          reference: response.reference,
          member_id: memberId,
          email: email,
          subscription: plan
        })

      });

      alert("Payment Successful!");

    },

    onClose: function() {
      alert("Transaction Cancelled");
    }

  });

  handler.openIframe();
}

</script>

</body>
</html>
