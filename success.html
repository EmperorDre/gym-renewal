<!DOCTYPE html>
<html>
<head>

<title>Renewal Successful</title>

<style>

body{
  margin:0;
  background:#0f0f0f;
  font-family:Arial,sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
}

.card{
  background:#1a1a1a;
  padding:40px;
  border-radius:16px;
  width:350px;
  text-align:center;
}

h1{
  color:#00c853;
  margin-bottom:15px;
}

p{
  color:#999;
  line-height:1.6;
}

</style>

</head>

<body>

<div class="card">

<h1>Payment Successful ✅</h1>

<p>
Your gym membership renewal was completed successfully.
</p>

</div>

<script>

fetch('https://dhamielarey002.app.n8n.cloud/webhook-test/gym-renewal', {

method:'POST',

headers:{
'Content-Type':'application/json'
},

body:JSON.stringify({

email:'samdre247@gmail.com',
subscription:'Monthly',
payment_status:'Paid',
source:'Paystack'

})

});

</script>

<body>

<div class="card">

<h1>Renewal Successful</h1>

<p>Your gym membership has been renewed successfully.</p>

<hr>

<p><strong>Name:</strong>
<span id="memberName"></span></p>

<p><strong>Email:</strong>
<span id="memberEmail"></span></p>

<p><strong>Plan:</strong>
<span id="memberPlan"></span></p>

<p><strong>Amount Paid:</strong>
<span id="memberAmount"></span></p>

<p><strong>Reference:</strong>
<span id="paymentReference"></span></p>

</div>

<script>

const firstName = localStorage.getItem("first_name");
const lastName = localStorage.getItem("last_name");
const email = localStorage.getItem("email");
const subscription = localStorage.getItem("subscription");
const amount = localStorage.getItem("amount");
const reference = localStorage.getItem("reference");

document.getElementById("memberName").innerText =
firstName + " " + lastName;

document.getElementById("memberEmail").innerText =
email;

document.getElementById("memberPlan").innerText =
subscription;

document.getElementById("memberAmount").innerText =
"₦" + amount;

document.getElementById("paymentReference").innerText =
reference;

</script>

</body>

</html>
